services:
  - type: web
    name: vami-bags-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python start.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: PORT
        value: 8000
    healthCheckPath: /health
    autoDeploy: true 